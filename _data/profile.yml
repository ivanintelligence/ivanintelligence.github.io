paragraphs: >
  Hi! I’m John Ivan, an AI / Machine Learning Engineer with experience in machine learning and software development. With a technical background in ML workflows and software development life cycles, I define use cases, develop AI-powered software, and apply MLOps for Responsible AI. I have worked with global software engineering teams at scale. I’m a junior professional whose track record, Cum Laude, publications, awards, and leadership roles, shows I learn fast and am committed to excellence. I’m eager to commence my professional journey with a reputable organization dedicated to world-class quality.